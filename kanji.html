<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Kanji N5 & N4 Lengkap - Animasi Sakura</title>
    <style>
        /* TEMA PEMANDANGAN JEPANG & FULL ANIMASI */
        body {
            background: url('https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            color: #fff0f5; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Animasi Bunga Gugur */
        .sakura-petal {
            position: fixed;
            top: -10px;
            background-color: #ffb7c5;
            border-radius: 15px 0px 15px 0px;
            width: 12px;
            height: 16px;
            opacity: 0.8;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 5px rgba(255, 183, 197, 0.5);
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg) translateX(50px); opacity: 0; }
        }

        h1 {
            color: #ffb7c5; 
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8), 0 0 15px rgba(255, 183, 197, 0.5);
            animation: fadeInDown 1s ease-out;
        }
        
        h2 {
            color: #ffb7c5;
            font-weight: normal;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        /* Glassmorphism Container */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background-color: rgba(26, 8, 15, 0.75); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 183, 197, 0.2);
            animation: fadeInUp 1s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9); }
            50% { transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        /* Navigasi & Tombol */
        .nav-buttons { margin-bottom: 30px; }
        button {
            background-color: rgba(0,0,0,0.5);
            color: #ffb7c5;
            border: 1px solid #ffb7c5;
            border-radius: 25px;
            padding: 12px 25px;
            margin: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:hover {
            background-color: #ffb7c5;
            color: #12040a;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 7px 15px rgba(255, 183, 197, 0.5);
        }
        button.active {
            background-color: #ffb7c5;
            color: #12040a;
            box-shadow: 0 0 15px rgba(255, 183, 197, 0.6);
        }

        .radio-group {
            margin-bottom: 20px;
            font-size: 18px;
            color: #fff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 10px 20px;
            border-radius: 30px;
        }
        .radio-group input[type="radio"] {
            accent-color: #ffb7c5;
            transform: scale(1.2);
            margin-right: 8px;
            cursor: pointer;
        }

        .mode-section {
            display: none;
            padding: 20px 0;
        }
        .active-section {
            display: block;
            animation: popIn 0.5s ease-out;
        }
        
        /* Mode 1: Tebak Huruf */
        .kanji-display {
            font-size: 140px;
            margin: 10px 0;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(255, 183, 197, 0.8), 2px 2px 10px rgba(0,0,0,0.9);
            animation: popIn 0.6s ease-out;
            line-height: 1.2;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 600px;
            margin: 0 auto;
        }
        .options button {
            font-size: 18px;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .opt-arti { font-size: 20px; font-weight: bold; color: #fff; }
        .opt-romaji { font-size: 14px; color: #ddd; margin-top: 5px; }
        
        .feedback {
            font-size: 22px;
            margin-top: 20px;
            height: 30px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* Mode 2: Tulis Manual (Canvas) */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 20px;
            padding-bottom: 10px;
            /* Membatasi tinggi tabel agar website tidak kepanjangan */
            max-height: 70vh; 
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 2px;
            min-width: 900px; 
        }
        th {
            background-color: rgba(74, 28, 42, 0.9);
            color: #ffb7c5;
            padding: 12px;
            border-radius: 5px;
            font-size: 18px;
            position: sticky; /* Agar header tabel tetap terlihat saat di-scroll */
            top: 0;
            z-index: 5;
        }
        td {
            background-color: rgba(30, 10, 15, 0.8);
            padding: 10px;
            text-align: center;
            vertical-align: middle;
            border-radius: 5px;
        }
        .kanji-cell {
            font-size: 50px;
            width: 180px;
            color: #ffffff;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            line-height: 1;
        }
        .arti-text {
            font-size: 18px;
            color: #a8ffb2;
            display: block;
            margin-top: 8px;
            font-weight: bold;
        }
        .romaji-text {
            font-size: 14px;
            color: #ffb7c5;
            display: block;
            margin-top: 3px;
        }
        .btn-urutan {
            display: inline-block;
            margin-top: 10px;
            font-size: 12px;
            color: #a8ffb2;
            text-decoration: none;
            border: 1px solid #a8ffb2;
            padding: 5px 10px;
            border-radius: 6px;
            background: rgba(0,0,0,0.5);
            transition: all 0.2s;
        }
        .btn-urutan:hover {
            background-color: #a8ffb2;
            color: #000;
            transform: scale(1.05);
        }
        .draw-canvas {
            background-color: rgba(10, 2, 5, 0.9);
            border: 2px dashed #6b2d41;
            border-radius: 10px;
            cursor: crosshair;
            touch-action: none;
        }
        .btn-clear {
            font-size: 13px;
            padding: 8px 12px;
            border-color: #ff4444;
            color: #ff4444;
            border-radius: 5px;
            background: transparent;
        }
        .btn-clear:hover {
            background-color: #ff4444;
            color: #fff;
        }

        .table-responsive::-webkit-scrollbar { height: 10px; width: 10px; }
        .table-responsive::-webkit-scrollbar-track { background: rgba(26, 8, 15, 0.5); border-radius: 5px; }
        .table-responsive::-webkit-scrollbar-thumb { background: #6b2d41; border-radius: 5px; }
        .table-responsive::-webkit-scrollbar-thumb:hover { background: #ffb7c5; }
    </style>
</head>

        petal.style.left = Math.random() * 100 + 'vw';
        petal.style.animationDuration = Math.random() * 4 + 3 + 's'; 
        const size = Math.random() * 0.5 + 0.8;
        petal.style.transform = `scale(${size})`;
        document.body.appendChild(petal);
        setTimeout(() => { petal.remove(); }, 7000);
    }
    setInterval(createSakura, 400);

    let currentKanjiList = [];
    let currentQuestionObj = null;

    function switchMode(mode) {
        document.getElementById('mode-tebak').classList.remove('active-section');
        document.getElementById('mode-tulis').classList.remove('active-section');
        document.getElementById('btn-tebak').classList.remove('active');
        document.getElementById('btn-tulis').classList.remove('active');

        const section = document.getElementById(`mode-${mode}`);
        section.classList.remove('active-section');
        void section.offsetWidth; 
        section.classList.add('active-section');
        
        document.getElementById(`btn-${mode}`).classList.add('active');
        initApp();
    }

    function getSelectedLevel() {
        return document.querySelector('input[name="kanjiLevel"]:checked').value;
    }

    function initApp() {
        const level = getSelectedLevel();
        currentKanjiList = dbKanji.filter(item => item.lvl === level);
        generateQuestion();
        generateTulisTable();
    }

    // --- TEBAK KANJI ---
    function generateQuestion() {
        const correctIndex = Math.floor(Math.random() * currentKanjiList.length);
        currentQuestionObj = currentKanjiList[correctIndex];
        
        const displayKanji = document.getElementById('question-kanji');
        displayKanji.innerText = currentQuestionObj.k;
        
        displayKanji.classList.remove('active-section');
        void displayKanji.offsetWidth;
        displayKanji.style.animation = 'popIn 0.4s ease-out';
        
        document.getElementById('tebak-feedback').innerText = '';

        let options = [currentQuestionObj];
        while (options.length < 4) {
            let randomObj = currentKanjiList[Math.floor(Math.random() * currentKanjiList.length)];
            if (!options.some(opt => opt.k === randomObj.k)) {
                options.push(randomObj);
            }
        }
        options.sort(() => Math.random() - 0.5);

        const container = document.getElementById('options-container');
        container.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerHTML = `<span class="opt-arti">${opt.m}</span><span class="opt-romaji">${opt.r}</span>`;
            btn.onclick = () => checkAnswer(opt.k, currentQuestionObj.k);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selectedKanji, correctKanji) {
        const feedback = document.getElementById('tebak-feedback');
        feedback.style.animation = 'none';
        void feedback.offsetWidth;
        feedback.style.animation = 'popIn 0.3s ease-out';

        if (selectedKanji === correctKanji) {
            feedback.innerText = "🌸 Benar! Hebat! 🌸";
            feedback.style.color = "#a8ffb2"; 
            setTimeout(generateQuestion, 1200);
        } else {
            feedback.innerText = `❌ Salah. Arti yang benar adalah "${currentQuestionObj.m}"`;
            feedback.style.color = "#ff8da1";
        }
    }

    // --- TULIS MANUAL ---
    function generateTulisTable() {
        const container = document.getElementById('tulis-container');
        
        let html = '<table>';
        html += '<tr><th>Kanji & Arti</th><th>1 (Jiplak)</th><th>2</th><th>3</th><th>4</th><th>5</th><th>Aksi</th></tr>';
        
        currentKanjiList.forEach((item, index) => {
            const searchUrl = `https://www.google.com/search?q=${item.k}+kanji+stroke+order+gif&tbm=isch`;

            html += `<tr id="row-${index}">`;
            html += `<td class="kanji-cell">
                        ${item.k}
                        <span class="arti-text">${item.m}</span>
                        <span class="romaji-text">${item.r}</span>
                        <a href="${searchUrl}" target="_blank" class="btn-urutan" title="Lihat langkah demi langkah di Google">Cek Urutan 🎬</a>
                     </td>`;
            
            for (let i = 0; i < 5; i++) {
                html += `<td><canvas class="draw-canvas" width="100" height="100" data-row="${index}" data-col="${i}" data-char="${item.k}"></canvas></td>`;
            }
            html += `<td><button class="btn-clear" onclick="clearCanvases(${index})">Hapus</button></td>`;
            html += `</tr>`;
        });
        
        html += '</table>';
        container.innerHTML = html;
        setupDrawing();
    }

    function drawGuide(canvas, char) {
        const ctx = canvas.getContext('2d');
        ctx.font = "70px sans-serif";
        ctx.fillStyle = "rgba(255, 183, 197, 0.25)"; 
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(char, canvas.width / 2, canvas.height / 2 + 5);
    }

    function clearCanvases(rowIndex) {
        const canvases = document.querySelectorAll(`canvas[data-row="${rowIndex}"]`);
        canvases.forEach(canvas => {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if(canvas.getAttribute('data-col') === "0") {
                drawGuide(canvas, canvas.getAttribute('data-char'));
            }
        });
    }

    function setupDrawing() {
        const canvases = document.querySelectorAll('.draw-canvas');
        
        canvases.forEach(canvas => {
            const ctx = canvas.getContext('2d');
            let isDrawing = false;

            if(canvas.getAttribute('data-col') === "0") {
                drawGuide(canvas, canvas.getAttribute('data-char'));
            }

            canvas.addEventListener('mousedown', startPosition);
            canvas.addEventListener('mouseup', endPosition);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseout', endPosition);

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault(); 
                startPosition(e.touches[0]);
            }, { passive: false });
            
            canvas.addEventListener('touchend', endPosition);
            
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                draw(e.touches[0]);
            }, { passive: false });

            function startPosition(e) {
                isDrawing = true;
                draw(e);
            }

            function endPosition() {
                isDrawing = false;
                ctx.beginPath(); 
            }

            function draw(e) {
                if (!isDrawing) return;

                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#ffb7c5'; 
                ctx.shadowBlur = 4;
                ctx.shadowColor = '#ffb7c5'; 

                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);
            }
        });
    }

    window.onload = initApp;
