<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nihongo Master | Simulasi JLPT N4</title>
    <style>
        /* Desain Minimalis & Profesional */
        :root {
            --panel-bg: rgba(10, 10, 10, 0.85); 
            --border-color: #2a2a2a;
            --text-main: #ffffff;
            --text-muted: #999999;
            --accent-japan: #c91f37; 
            --accent-success: #2e7d32;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-image: url('https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?q=80&w=2070&auto=format&fit=crop'); 
            background-size: cover; 
            background-position: center;
            background-attachment: fixed;
            background-color: #000000;
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow-x: hidden; 
            padding: 20px;
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 40px;
            width: 100%;
            max-width: 700px;
            border-top: 3px solid var(--accent-japan);
            backdrop-filter: blur(8px);
            border-radius: 4px;
        }

        h1, h2 { font-weight: 300; margin-bottom: 20px; text-align: center; letter-spacing: 1px; }
        .jp-title { color: var(--accent-japan); font-size: 1.2rem; margin-bottom: 10px; display: block; text-align: center; letter-spacing: 2px;}

        /* Header Info */
        .dash-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 30px; }
        .points-badge { border: 1px solid var(--accent-japan); color: var(--accent-japan); padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; letter-spacing: 1px; }

        /* Audio Controls */
        .audio-box { text-align: center; margin-bottom: 30px; padding: 20px; border: 1px dashed var(--border-color); background: rgba(0, 0, 0, 0.4); border-radius: 4px;}
        .btn-play {
            background: var(--accent-japan); color: #fff; border: none; padding: 15px 30px; 
            font-size: 1.1rem; cursor: pointer; border-radius: 50px; font-weight: bold;
            display: inline-flex; align-items: center; gap: 10px; transition: 0.2s;
        }
        .btn-play:hover { background: #a0172b; transform: scale(1.05); }
        .btn-play:disabled { background: #555; cursor: not-allowed; transform: none; }
        
        .speed-control { margin-top: 15px; font-size: 0.9rem; color: var(--text-muted); }
        .speed-control select { background: #111; color: #fff; border: 1px solid var(--border-color); padding: 5px; border-radius: 4px; outline: none;}

        /* Quiz Options */
        .question-text { font-size: 1.1rem; margin-bottom: 20px; text-align: center; color: #ddd; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-option {
            background: rgba(0, 0, 0, 0.6); color: var(--text-main); border: 1px solid var(--border-color);
            padding: 15px; cursor: pointer; text-align: left; font-size: 1rem; border-radius: 2px;
            transition: 0.2s;
        }
        .btn-option:hover { border-color: var(--accent-japan); background: rgba(20, 20, 20, 0.9); padding-left: 20px;}
        .btn-option.correct { background: rgba(46, 125, 50, 0.3); border-color: var(--accent-success); color: #fff; }
        .btn-option.wrong { background: rgba(201, 31, 55, 0.3); border-color: var(--accent-japan); color: #fff; }

        .btn-next {
            width: 100%; padding: 15px; background: #111; color: var(--text-main);
            border: 1px solid var(--border-color); cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; transition: 0.2s; font-weight: bold; display: none;
        }
        .btn-next:hover { background: #222; border-color: #555; }

        /* Result Screen */
        .result-box { text-align: center; display: none; }
        .final-score { font-size: 4rem; color: var(--accent-japan); font-weight: bold; margin: 20px 0; }

                /* ========================================= */
        /* 👇 CSS TOMBOL BACK POJOK KIRI ATAS 👇 */
        /* ========================================= */
        .btn-back-pojok {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--accent-japan);
            color: var(--accent-japan);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
            z-index: 9999; /* Pastikan selalu berada di lapisan paling atas */
            backdrop-filter: blur(5px);
        }

        .btn-back-pojok:hover {
            background: var(--accent-japan);
            color: #fff;
            box-shadow: 0 0 15px rgba(201, 31, 55, 0.5);
        }
        /* ========================================= */
    </style>
</head>
<body>

        let currentQuestionIndex = 0;
        let score = 0;
        let isAnswered = false;

        const optionsContainer = document.getElementById('options-container');
        const btnNext = document.getElementById('btn-next');
        const btnPlay = document.getElementById('btn-play');
        const progressText = document.getElementById('progress-text');

        function loadQuestion() {
            isAnswered = false;
            btnNext.style.display = "none";
            btnPlay.disabled = false;
            btnPlay.textContent = "🔊 Putar Audio Soal";
            progressText.textContent = `${currentQuestionIndex + 1}/${questionsDB.length}`;
            
            // Hentikan suara jika masih ada yang berjalan
            window.speechSynthesis.cancel();

            const currentQ = questionsDB[currentQuestionIndex];
            optionsContainer.innerHTML = "";

            currentQ.options.forEach((option, index) => {
                const btn = document.createElement("button");
                btn.className = "btn-option";
                btn.textContent = `${index + 1}. ${option}`;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function playAudio() {
            if (!window.speechSynthesis) {
                alert("Browser Anda tidak mendukung fitur Text-to-Speech.");
                return;
            }

            // Hentikan suara sebelumnya
            window.speechSynthesis.cancel();

            const text = questionsDB[currentQuestionIndex].audio;
            const utterance = new SpeechSynthesisUtterance(text);
            
            // Atur bahasa ke Jepang
            utterance.lang = 'ja-JP';
            
            // Atur kecepatan berdasarkan pilihan user
            const speed = parseFloat(document.getElementById('speed').value);
            utterance.rate = speed;

            // Event saat suara mulai dan selesai
            utterance.onstart = () => {
                btnPlay.textContent = "Sedang Memutar... 🎧";
                btnPlay.disabled = true;
            };
            utterance.onend = () => {
                btnPlay.textContent = "🔄 Putar Ulang Audio";
                btnPlay.disabled = false;
            };

            window.speechSynthesis.speak(utterance);
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (isAnswered) return; // Mencegah klik dua kali
            isAnswered = true;
            
            // Hentikan audio secara otomatis saat pengguna menjawab
            window.speechSynthesis.cancel();

            const currentQ = questionsDB[currentQuestionIndex];
            const allButtons = optionsContainer.querySelectorAll('.btn-option');

            if (selectedIndex === currentQ.answer) {
                btnElement.classList.add('correct');
                score += 20; // 20 Poin per soal
            } else {
                btnElement.classList.add('wrong');
                // Tunjukkan jawaban yang benar
                allButtons[currentQ.answer].classList.add('correct');
            }

            // Matikan semua tombol
            allButtons.forEach(b => b.style.cursor = "default");
            
            btnNext.style.display = "block";
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questionsDB.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').style.display = "none";
            const resultScreen = document.getElementById('result-screen');
            resultScreen.style.display = "block";
            
            document.getElementById('final-score').textContent = score;
            
            const feedback = document.getElementById('feedback-message');
            if (score === 100) {
                feedback.textContent = "Sempurna! Kemampuan mendengarkan Anda sudah siap untuk JLPT N4.";
                document.getElementById('final-score').style.color = "var(--accent-success)";
            } else if (score >= 60) {
                feedback.textContent = "Kerja bagus! Terus biasakan telinga Anda dengan percakapan bahasa Jepang.";
            } else {
                feedback.textContent = "Jangan menyerah! Coba turunkan kecepatan audio dan berlatih lagi.";
            }
        }

        // Inisialisasi Kuis Pertama Kali
        window.onload = loadQuestion;
    </script>
</body>
</html>
